name: Update RSS Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    - name: Set up Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install beautifulsoup4 lxml # Added to automatically repair broken XML/HTML structures

    - name: Run RSS fetch script
      run: python fetch_rss.py

    - name: Commit and push updated index.html
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Automated RSS update" || exit 0
        git push
